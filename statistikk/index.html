<!DOCTYPE html>
<html lang="nb">
<head>
    <title>Kleppstatistikk</title>

    <style>
        body {
            font-family: "Comic Sans MS", "Comic Sans", system-ui, sans-serif;
            font-size: x-large;
            color: white;
            background-color: black;
        }

        table th {
            border: 1px solid #909090;
            padding-top: 2px;
            padding-bottom: 2px;
            font-size: medium;
        }

        table td {
            border: 1px solid #909090;
            padding-top: 2px;
            padding-bottom: 2px;
            font-size: large;
        }

        .content-center {
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        .content-center-narrow {
            width: 60%;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 2rem;
            text-align: center;
        }

        .row {
            display: flex;
            flex-direction: row;
            justify-content: center;
        }

        .counter {
            margin-left: 2rem;
            margin-right: 2rem;
        }

        .hide {
            visibility: hidden;
        }
    </style>
</head>
<body>

<div class="content-center">
    <h1 id="heading">Kleppstatistikk</h1>
</div>

<div class="content-center row hide" id="klippTall">
    <div class="counter">
        <h2><b id="klipp">...</b></h2>
        <p>Klipp</p>
    </div>
    <div class="counter">
        <h2><b id="klippere">...</b></h2>
        <p>Klippere</p>
    </div>
    <div class="counter">
        <h2><b id="totaltAntallVisninger">...</b></h2>
        <p>Totalt antall visninger</p>
    </div>
    <div class="counter">
        <h2><b id="gjennomsnittslengde">...</b></h2>
        <p>Gjennomsnittslengde</p>
    </div>
</div>

<div class="content-center">
    <h5 class="hide" id="toppKlippTittel">Tipp topp klipp da</h5>
</div>

<table class="content-center-narrow hide" id="toppKlippTable">
    <thead>
    <tr>
        <th>Tittel</th>
        <th>Klipper</th>
        <th>Visninger</th>
        <th>Link</th>
    </tr>
    </thead>
    <tbody id="toppKlippBody">

    </tbody>
</table>

<div class="content-center">
    <h5 class="hide" id="toppKlippereTittel">Flinkeste klipperne</h5>
</div>

<table class="content-center-narrow hide" id="toppKlippereTable">
    <thead>
    <tr>
        <th>Klipper</th>
        <th>Klipp</th>
        <th>Visninger</th>
        <th>Gjennomsnittsvisninger</th>
        <th>Gjennomsnittslengde</th>
    </tr>
    </thead>
    <tbody id="toppKlippereBody">

    </tbody>
</table>

<script type="application/javascript">
    const hentKlippStatistikk = async () => {
        const queryParams = new URLSearchParams(window.location.search);
        const spesial = queryParams.get("spesial");
        let start = queryParams.get("start");
        if (start == null) {
            start = "2023-01-01T00:00:00Z";
        }
        if (spesial === "Romania") {
            start = "2025-05-29T00:00:00Z";
        }
        let end = queryParams.get("end");
        if (end == null) {
            end = "2026-12-31T23:59:59Z";
        }
        if (spesial === "Romania") {
            end = "2025-07-08T02:00:00Z";
        }

        const heading = document.querySelector("#heading");
        if (spesial === "Romania") {
            heading.innerText = "Kleppstatistikk - Romania spesial";
        }

        const response = await fetch(`https://api.j4d.dev/spinner/clip/statistics?start=${start}&end=${end}`);

        const klipp = document.querySelector("#klipp");
        const klippere = document.querySelector("#klippere");
        const totaltAntallVisninger = document.querySelector("#totaltAntallVisninger");
        const gjennomsnittslengde = document.querySelector("#gjennomsnittslengde");

        const toppKlippBody = document.querySelector("#toppKlippBody");

        const toppKlippereBody = document.querySelector("#toppKlippereBody");

        const responseJson = await response.json();

        klipp.innerText = responseJson.clips;
        klippere.innerText = responseJson.creators;
        totaltAntallVisninger.innerText = responseJson.viewCount;
        gjennomsnittslengde.innerText = `${responseJson.averageDuration}s`;

        responseJson.topClips.forEach(topClip => {
            const row = document.createElement("tr");

            const tittelData = document.createElement("td");
            tittelData.innerText = topClip.title;
            row.appendChild(tittelData);

            const klipperData = document.createElement("td");
            klipperData.innerText = topClip.creatorName;
            row.appendChild(klipperData);

            const visningerData = document.createElement("td");
            visningerData.innerText = topClip.viewCount;
            row.appendChild(visningerData);

            const linkData = document.createElement("td");
            linkData.innerHTML = `<a href="${topClip.embedUrl}" target="_blank">Se klipp</a>`;
            row.appendChild(linkData);

            toppKlippBody.appendChild(row);
        });

        responseJson.topCreators.forEach(topCreator => {
            const row = document.createElement("tr");

            const klipperData = document.createElement("td");
            klipperData.innerText = topCreator.creator;
            row.appendChild(klipperData);

            const klippData = document.createElement("td");
            klippData.innerText = topCreator.totalClips;
            row.appendChild(klippData);

            const visningerData = document.createElement("td");
            visningerData.innerText = topCreator.totalViews;
            row.appendChild(visningerData);

            const gjennomsnittsvisningerData = document.createElement("td");
            gjennomsnittsvisningerData.innerText = topCreator.averageViews;
            row.appendChild(gjennomsnittsvisningerData);

            const gjennomsnittslengdeData = document.createElement("td");
            gjennomsnittslengdeData.innerText = `${topCreator.averageDuration}s`;
            row.appendChild(gjennomsnittslengdeData);

            toppKlippereBody.appendChild(row);
        });
    };

    document.addEventListener("DOMContentLoaded", () => {
        Promise.all([
            hentKlippStatistikk()
        ]).then(() => {
            document.querySelector("#klippTall").classList.remove("hide");
            document.querySelector("#toppKlippTittel").classList.remove("hide");
            document.querySelector("#toppKlippTable").classList.remove("hide");
            document.querySelector("#toppKlippBody").classList.remove("hide");
            document.querySelector("#toppKlippereTittel").classList.remove("hide");
            document.querySelector("#toppKlippereTable").classList.remove("hide");
            document.querySelector("#toppKlippereBody").classList.remove("hide");
        }).catch(reason => console.error(`Initial load failed. Reason: ${reason}`));
    });
</script>
</body>
</html>
