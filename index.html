<!DOCTYPE html>
<html lang="nb">
<head>
    <title>Klepp</title>

    <style>
        body {
            margin: 0;
            padding: 0;

            background-color: black;
            color: white;
        }

        .wrapper {
            width: 90%;
            height: 100vh;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        .title {
            width: 60%;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            display: block;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body>

<div class="wrapper">
    <h1 class="title" id="title"></h1>
    <iframe height="720"
            id="video"
            src="https://clips.twitch.tv/embed?clip=BlazingRichManateeUncleNox-yqWxOh8CdpzZQnkQ&parent=klepp.egentlig.app&autoplay=true&muted=false"
            width="1280">
    </iframe>
    <p id="description"></p>
</div>

<script type="application/javascript">
    function shuffle(array) {
        let currentIndex = array.length;

        while (currentIndex !== 0) {
            let randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const formatter = new Intl.DateTimeFormat("no-NO", {
            timeZone: "Europe/Oslo",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false,
        });

        const title = document.getElementById("title");
        const description = document.getElementById("description");

        const queryParams = new URLSearchParams(window.location.search);
        const spesial = queryParams.get("spesial");
        let start = queryParams.get("start");
        if (start == null) {
            start = "2023-01-01T00:00:00Z";
        }
        if (spesial === "Romania") {
            start = "2025-05-29T00:00:00Z";
        }
        let end = queryParams.get("end");
        if (end == null) {
            end = "2026-12-31T23:59:59Z";
        }
        if (spesial === "Romania") {
            end = "2025-07-08T02:00:00Z";
        }

        let viewCountLimit = queryParams.get("viewCountLimit");
        if (viewCountLimit == null) {
            viewCountLimit = 0;
        }

        const response = await fetch(`https://api.j4d.dev/spinner/clip?start=${start}&end=${end}&viewCountLimit=${viewCountLimit}&ignoreTags=karaoke,teknisk,nattero`);
        let clips = await response.json();

        let i = 0;

        function loadClip(index) {
            if (i === 0) {
                shuffle(clips);
            }

            const clip = clips[index];
            const video = document.getElementById("video");
            video.src = `https://clips.twitch.tv/embed?clip=${clip.id}&parent=klepp.egentlig.app&autoplay=true&muted=false`;

            title.innerText = clip.title;

            const date = new Date(clip.createdAt);

            description.innerText = `Klippet av ${clip.creatorName}. Visninger: ${clip.viewCount}. Klippet: ${formatter.format(date).replace(",", "")}. (Klipp nr. ${index + 1} av ${clips.length}.) (${clip.tags.join(",")})`;

            const delay = Math.ceil(clip.duration * 1000);
            setTimeout(() => {
                i = (i + 1) % clips.length;
                loadClip(i);
            }, delay);
        }

        loadClip(i);
    });
</script>
</body>
</html>
